<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloxdHub Browser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="browser-window">

    <!-- ── Tab Bar ─────────────────────────────────────────────── -->
    <div class="tab-bar" id="tab-bar">
      <div class="tabs" id="tabs-container"></div>
      <button class="new-tab-btn" id="new-tab-btn" title="New tab">+</button>
      <!-- window controls (cosmetic) -->
      <div class="window-controls">
        <span class="wc minimize"></span>
        <span class="wc maximize"></span>
        <span class="wc close"></span>
      </div>
    </div>

    <!-- ── Navigation Bar ───────────────────────────────────────── -->
    <div class="nav-bar">
      <div class="nav-btn-group">
        <button class="nav-btn" id="back-btn" title="Back" disabled>&#8249;</button>
        <button class="nav-btn" id="forward-btn" title="Forward" disabled>&#8250;</button>
        <button class="nav-btn" id="reload-btn" title="Reload">&#8635;</button>
        <button class="nav-btn" id="home-btn" title="Home">&#8962;</button>
      </div>
      <div class="address-bar-wrap">
        <span class="lock-icon" id="lock-icon">&#128274;</span>
        <input
          type="text"
          id="address-bar"
          class="address-bar"
          placeholder="Search or enter URL"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="go-btn" id="go-btn" title="Go">&#10132;</button>
      </div>
      <div class="nav-extras">
        <button class="nav-btn" title="Bookmarks">&#9733;</button>
        <button class="nav-btn" title="Settings">&#8942;</button>
      </div>
    </div>

    <!-- ── Content Area ─────────────────────────────────────────── -->
    <div class="content-area" id="content-area">

      <!-- New-tab page (Bing-like) -->
      <div class="new-tab-page" id="new-tab-page">
        <div class="ntb-background" id="ntb-background"></div>
        <div class="ntb-overlay"></div>
        <div class="ntb-body">
          <div class="ntb-top">
            <div class="ntb-logo">BloxdHub</div>
          </div>
          
          <div class="ntb-center">
            <div class="ntb-search-container">
              <div class="ntb-search-box">
                <span class="ntb-search-icon">🔍</span>
                <input
                  type="text"
                  id="ntb-search"
                  placeholder="Search the web"
                  autocomplete="off"
                />
              </div>
              <div class="ntb-buttons">
                <button id="ntb-search-btn" class="search-btn">Search</button>
                <button id="ntb-lucky-btn" class="lucky-btn">I'm Feeling Lucky</button>
              </div>
            </div>
          </div>

          <div class="ntb-bottom">
            <div class="quick-links">
              <a class="ql-item" data-url="https://www.google.com" title="Google">
                <div class="ql-icon">G</div>
              </a>
              <a class="ql-item" data-url="https://www.youtube.com" title="YouTube">
                <div class="ql-icon">▶</div>
              </a>
              <a class="ql-item" data-url="https://www.wikipedia.org" title="Wikipedia">
                <div class="ql-icon">W</div>
              </a>
              <a class="ql-item" data-url="https://www.reddit.com" title="Reddit">
                <div class="ql-icon">r</div>
              </a>
              <a class="ql-item" data-url="https://www.github.com" title="GitHub">
                <div class="ql-icon">⚡</div>
              </a>
              <a class="ql-item" data-url="https://www.stackoverflow.com" title="Stack Overflow">
                <div class="ql-icon">⌘</div>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Search results page (shown after a search) -->
      <div class="results-page" id="results-page" style="display:none;">
        <div class="results-header">
          <div class="results-logo">
            <span class="logo-b">B</span>loxdHub
          </div>
          <div class="results-search-bar-wrap">
            <input type="text" id="results-search" class="results-search" autocomplete="off" />
            <button id="results-search-btn">&#128269;</button>
          </div>
          <div class="results-tabs-nav">
            <button class="rtab active">All</button>
            <button class="rtab">Images</button>
            <button class="rtab">Videos</button>
            <button class="rtab">News</button>
          </div>
        </div>
        <div class="results-body">
          <div id="results-list" class="results-list"></div>
          <div id="results-sidebar" class="results-sidebar"></div>
        </div>
        <div id="results-loading" class="results-loading" style="display:none;">
          <div class="spinner"></div>
          <p>Searching…</p>
        </div>
        <div id="results-error" class="results-error" style="display:none;"></div>
      </div>

      <!-- Iframe for navigating to actual pages -->
      <div class="frame-wrap" id="frame-wrap" style="display:none;">
        <iframe
          id="browser-frame"
          title="browser content"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
        ></iframe>
        <!-- Shown when the site blocks iframe embedding -->
        <div class="frame-blocked" id="frame-blocked" style="display:none;">
          <div class="blocked-icon">&#128683;</div>
          <h2>Can't display this page here</h2>
          <p>
            This page may have restrictions that prevent it from loading inside
            the browser. You can open it in a full browser tab instead.
          </p>
          <div class="blocked-actions">
            <button id="open-external-btn" class="btn-primary">Open in new tab &#8599;</button>
            <button id="go-back-blocked-btn" class="btn-secondary">Go back</button>
          </div>
        </div>
      </div>

    </div><!-- /content-area -->

    <!-- ── DevTools Panel ───────────────────────────────────────── -->
    <div class="devtools-panel" id="devtools-panel" style="display:none;">
      <div class="devtools-header">
        <div class="devtools-title">DevTools</div>
        <div class="devtools-tabs">
          <button class="devtools-tab active" data-tab="console">Console</button>
          <button class="devtools-tab" data-tab="network">Network</button>
          <button class="devtools-tab" data-tab="elements">Elements</button>
        </div>
        <button class="devtools-close" id="devtools-close">✕</button>
      </div>
      <div class="devtools-content">
        <div class="devtools-tab-content active" id="devtools-console">
          <div class="console-messages" id="console-messages"></div>
          <div class="console-input-wrap">
            <input type="text" id="console-input" class="console-input" placeholder="Type command and press Enter..." />
          </div>
        </div>
        <div class="devtools-tab-content" id="devtools-network">
          <div class="network-requests" id="network-requests">No requests captured</div>
        </div>
        <div class="devtools-tab-content" id="devtools-elements">
          <div class="elements-tree" id="elements-tree">No page loaded</div>
        </div>
      </div>
    </div>

    <!-- ── Status Bar ────────────────────────────────────────────── -->
    <div class="status-bar" id="status-bar"></div>

  </div><!-- /browser-window -->

  <script src="browser.js"></script>
</body>
</html>
